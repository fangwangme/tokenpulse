name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            target: x86_64-apple-darwin
            artifact_name: tokenpulse-x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin
            artifact_name: tokenpulse-aarch64-apple-darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p tokenpulse-cli --locked --target ${{ matrix.target }}

      - name: Package archive
        run: |
          mkdir -p .shared/release/${{ matrix.artifact_name }}
          cp target/${{ matrix.target }}/release/tokenpulse .shared/release/${{ matrix.artifact_name }}/tokenpulse
          tar -C .shared/release/${{ matrix.artifact_name }} -czf .shared/release/${{ matrix.artifact_name }}.tar.gz tokenpulse

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: .shared/release/${{ matrix.artifact_name }}.tar.gz

  publish-release:
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/*/*.tar.gz \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
